<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#1f7a5a">
  <title>写真で家計簿</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- 下スワイプ更新インジケータ -->
  <div id="ptr" class="ptr"><span id="ptrText">下に引いて更新</span></div>

  <header class="app-header">
    <span class="logo">💰</span>
    <h1>写真で家計簿</h1>
  </header>

  <main id="app">
    <!-- 合言葉入力 -->
    <section id="authView" class="card hidden">
      <h2>合言葉を入力</h2>
      <p class="muted">この端末で初回のみ。家族で共有している合言葉を入力してください。</p>
      <input type="password" id="tokenInput" placeholder="合言葉" autocomplete="off">
      <button id="saveTokenBtn" class="primary">保存して開始</button>
      <p id="authError" class="error"></p>
    </section>

    <!-- アップロード -->
    <section id="uploadCard" class="card">
      <h2>レシートを追加</h2>
      <div class="pick-row">
        <label for="cameraInput" class="upload-zone">
          <span class="upload-icon">📷</span>
          <span>撮影する</span>
        </label>
        <label for="fileInput" class="upload-zone">
          <span class="upload-icon">🖼️</span>
          <span>写真を選ぶ</span>
        </label>
      </div>
      <input type="file" id="cameraInput" accept="image/*" capture="environment" multiple hidden>
      <input type="file" id="fileInput" accept="image/*" multiple hidden>
      <div id="previewList" class="preview-list"></div>
      <button id="uploadBtn" class="primary" disabled>アップロード</button>
      <p id="uploadStatus" class="status"></p>
      <p class="muted small">写真はアップロード後すぐに読み取り、結果を下に表示します。</p>
    </section>

    <!-- 読み取り結果（直近3レシートをタブ表示） -->
    <section id="recentCard" class="card">
      <h2>読み取り結果（直近3件）</h2>
      <div id="recentTabs" class="tabs"></div>
      <div id="recentPanel" class="tab-panel"><p class="muted">読み込み中…</p></div>
      <a id="webLink" class="text-link" href="#" target="_blank" rel="noopener">詳しい家計簿ダッシュボードを開く →</a>
    </section>
  </main>

  <script src="config.js"></script>
  <script src="app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(function(){});
    }
  </script>
</body>
</html>
